llm:
  provider: openai
  url: null
  model: gpt-4o
  temperature: 1.0
  max_tokens: 16384
  top_p: 0.95
  top_k: 64
  enable_thinking: false
models:
  glm_5_1:
    provider: glm
    model: glm-5.1
    temperature: 1.0
    max_tokens: 8192
    top_p: 0.95
  gpt_4o:
    provider: openai
    model: gpt-4o
    temperature: 1.0
    max_tokens: 16384
    top_p: 0.95
  vpn_local:
    provider: local
    url: http://10.64.82.60:8000
    model: Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
    temperature: 1.0
    max_tokens: 131072
    top_p: 0.95
    top_k: 64
    enable_thinking: false
  local_llama:
    provider: local
    base_url: http://llama-api-manager:8081
    model: Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
    temperature: 1.0
    max_tokens: 131072
    top_p: 0.95
    top_k: 64
    enable_thinking: false
  debate_advocate:
    max_tokens: 256
    enable_thinking: false
    thinking_budget_tokens: 4000
  debate_judge:
    max_tokens: 256
    enable_thinking: false
  checkpoint:
    max_tokens: 128
    enable_thinking: false
prompts:
  mode: concise
  workspace_file_max_chars: 4000
  config_change_approval_required: true
  # Emit per-mode capability/excluded-tool block in worker prompt. Turn off for
  # models that already know plan/build/converse semantics (e.g. Claude) via
  # per-model override: models.<name>.describe_mode_in_system_prompt: false.
  describe_mode_in_system_prompt: true
agent:
  supervisor_enabled: true
  max_retries: 2
  supervisor_pass_threshold: 0.8
  supervisor_mode_overrides:
    converse: 0.5
    plan: 0.75
    build: 0.7
  max_context_turns: 20
  max_context_messages: 40
  inflection_mode: none
  mode:
    default: converse
    temperature_delta: 0.3
    plan:
      excluded_tools:
      - file_write
      - shell_exec
      - git_commit
      - git_rollback
      - memory_add
      - discord_send
      - discord_set_nickname
      - discord_edit_channel
      - discord_create_channel
      - discord_delete_channel
      - discord_create_category
      - notion_create_page
      - notion_update_page
      - docker_test_up
      - docker_test_down
    build:
      excluded_tools: []
    converse:
      excluded_tools:
      - file_write
      - shell_exec
      - git_commit
      - git_rollback
      - git_log
      - docker_test_up
      - docker_test_down
      - docker_test_health
      - notion_create_page
      - notion_update_page
      - discord_set_nickname
      - discord_edit_channel
      - discord_create_channel
      - discord_delete_channel
      - discord_create_category
approval:
  plan:
    auto_allow:
      tools:
      - file_read
      - file_list
      - file_search
      - directory_tree
      - file_info
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - git_log
      - diagnostic_check
      - discord_list_channels
      paths:
      - plans/
    ask_user:
    - file_write
    - file_move
    - create_dir
    - shell_exec
    - execute_command
    - memory_add
    - write_config
    - git_commit
    - git_rollback
    - docker_test_up
    - docker_test_down
    - discord_send
    - discord_set_nickname
    - discord_edit_channel
    - notion_create_page
    - notion_update_page
    - discord_create_channel
    - discord_delete_channel
    - discord_create_category
    auto_fail: []
  build:
    auto_allow:
      tools:
      - file_read
      - file_write
      - file_list
      - file_search
      - directory_tree
      - file_move
      - create_dir
      - file_info
      - shell_exec
      - execute_command
      - memory_add
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - git_log
      - diagnostic_check
      - discord_list_channels
      paths: []
    ask_user:
    - git_commit
    - git_rollback
    - docker_test_up
    - docker_test_down
    - write_config
    - discord_send
    - discord_set_nickname
    - discord_edit_channel
    - notion_create_page
    - notion_update_page
    - discord_create_channel
    - discord_delete_channel
    - discord_create_category
    auto_fail: []
  converse:
    auto_allow:
      tools:
      - file_read
      - file_list
      - file_search
      - directory_tree
      - file_info
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - diagnostic_check
      - discord_list_channels
      paths: []
    ask_user:
    - write_config
    auto_fail: []
soul:
  enabled: true
  schedule: 0 5 * * *
  max_chars: 6000
discord_moderator:
  enabled: true
  schedule: 0 10 */3 * *
  conversations_category: Conversations
  archive_category: 📦 Archive
  inactive_days: 7
  themed_categories:
  - 🛠️ System Work
  - 💬 Chat
  - 🐛 Debugging
  - 📋 Planning
tools:
  discord:
    default_guild_id: '1492979119011397833'
    default_channel_id: '1492979120299053108'
    bot_name: phoebe-worker
  notion:
    default_parent_id: null
  memory:
    search_results: 5
    list_limit: 20
  web:
    search_results: 5
inflection:
  entropy_threshold: 1.5
  logprob_gap_threshold: 0.5
  top_logprobs: 5
  strong_marker_threshold: 1
  weak_marker_threshold: 3
  max_nudges_per_turn: 2
debate:
  checkpoint_messages: 4
  advocate_temperature: 0.4
  judge_temperature: 0.2
  advocate_model: debate_advocate
  judge_model: debate_judge
  use_judge: true
  max_total_messages: 12
logging:
  sessions_dir: /sessions
  log_supervisor_turns: true
  verbose_tools: true
