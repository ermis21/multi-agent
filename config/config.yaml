llm:
  base_url: http://llama-api-manager:8081
  model: local-model
  temperature: 1.0
  max_tokens: 131072
  top_p: 0.95
  top_k: 64
prompts:
  mode: concise
  workspace_file_max_chars: 4000
agent:
  supervisor_enabled: true
  max_retries: 2
  supervisor_pass_threshold: 0.7
  max_context_turns: 20
  max_context_messages: 40
  mode:
    default: converse
    temperature_delta: 0.3
    plan:
      excluded_tools:
        - file_write
        - shell_exec
        - git_commit
        - git_rollback
        - memory_add
        - discord_send
        - discord_set_nickname
        - discord_edit_channel
        - notion_create_page
        - notion_update_page
        - docker_test_up
        - docker_test_down
    build:
      excluded_tools: []
    converse:
      excluded_tools:
        - file_write
        - shell_exec
        - git_commit
        - git_rollback
        - git_log
        - docker_test_up
        - docker_test_down
        - docker_test_health
        - notion_create_page
        - notion_update_page
        - discord_set_nickname
        - discord_edit_channel
soul:
  enabled: true
  schedule: 0 5 * * *
  max_chars: 6000
tools:
  discord:
    default_guild_id: '1492979119011397833'
    default_channel_id: '1492979120299053108'
    bot_name: mab-worker
  notion:
    default_parent_id: null
  memory:
    search_results: 5
    list_limit: 20
  web:
    search_results: 5
logging:
  sessions_dir: /sessions
  log_supervisor_turns: true
