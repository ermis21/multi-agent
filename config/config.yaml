llm:
  provider: local
  base_url: http://llama-api-manager:8081
  model: gemma-4-E4B-it-Q8_0.gguf
  temperature: 1.0
  max_tokens: 131072
  top_p: 0.95
  top_k: 64
  enable_thinking: true
  thinking_budget_tokens: 8000
  url: null
models:
  vpn_local:
    provider: local
    url: http://10.64.82.60:8000
    model: llama3.2:latest
    temperature: 1.0
    max_tokens: 131072
    top_p: 0.95
    top_k: 64
    enable_thinking: false
prompts:
  mode: concise
  workspace_file_max_chars: 4000
  supervisor_threshold: 1.1
  config_change_approval_required: true
agent:
  supervisor_enabled: true
  max_retries: 2
  supervisor_pass_threshold: 0.7
  max_context_turns: 20
  max_context_messages: 40
  mode:
    default: converse
    temperature_delta: 0.3
    plan:
      excluded_tools:
      - file_write
      - shell_exec
      - git_commit
      - git_rollback
      - memory_add
      - discord_send
      - discord_set_nickname
      - discord_edit_channel
      - discord_create_channel
      - discord_delete_channel
      - discord_create_category
      - notion_create_page
      - notion_update_page
      - docker_test_up
      - docker_test_down
    build:
      excluded_tools: []
    converse:
      excluded_tools:
      - file_write
      - shell_exec
      - git_commit
      - git_rollback
      - git_log
      - docker_test_up
      - docker_test_down
      - docker_test_health
      - notion_create_page
      - notion_update_page
      - discord_set_nickname
      - discord_edit_channel
      - discord_create_channel
      - discord_delete_channel
      - discord_create_category
approval:
  plan:
    auto_allow:
      tools:
      - file_read
      - file_list
      - file_search
      - directory_tree
      - file_info
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - git_log
      - diagnostic_check
      - discord_list_channels
      paths:
      - plans/
    ask_user:
    - file_write
    - file_move
    - create_dir
    - shell_exec
    - execute_command
    - memory_add
    - write_config
    - git_commit
    - git_rollback
    - docker_test_up
    - docker_test_down
    - discord_send
    - discord_set_nickname
    - discord_edit_channel
    - notion_create_page
    - notion_update_page
    - discord_create_channel
    - discord_delete_channel
    - discord_create_category
    auto_fail: []
  build:
    auto_allow:
      tools:
      - file_read
      - file_write
      - file_list
      - file_search
      - directory_tree
      - file_move
      - create_dir
      - file_info
      - shell_exec
      - execute_command
      - memory_add
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - git_log
      - diagnostic_check
      - discord_list_channels
      paths: []
    ask_user:
    - git_commit
    - git_rollback
    - docker_test_up
    - docker_test_down
    - write_config
    - discord_send
    - discord_set_nickname
    - discord_edit_channel
    - notion_create_page
    - notion_update_page
    - discord_create_channel
    - discord_delete_channel
    - discord_create_category
    auto_fail: []
  converse:
    auto_allow:
      tools:
      - file_read
      - file_list
      - file_search
      - directory_tree
      - file_info
      - memory_search
      - memory_list
      - web_search
      - web_fetch
      - discord_read
      - notion_search
      - notion_get_page
      - read_config
      - git_status
      - diagnostic_check
      - discord_list_channels
      paths: []
    ask_user:
    - write_config
    auto_fail: []
soul:
  enabled: true
  schedule: 0 5 * * *
  max_chars: 6000
discord_moderator:
  enabled: true
  schedule: 0 10 */3 * *
  conversations_category: Conversations
  archive_category: 📦 Archive
  inactive_days: 7
  themed_categories:
  - 🛠️ System Work
  - 💬 Chat
  - 🐛 Debugging
  - 📋 Planning
tools:
  discord:
    default_guild_id: '1492979119011397833'
    default_channel_id: '1492979120299053108'
    bot_name: mab-worker
  notion:
    default_parent_id: null
  memory:
    search_results: 5
    list_limit: 20
  web:
    search_results: 5
logging:
  sessions_dir: /sessions
  log_supervisor_turns: true
  verbose_tools: true
