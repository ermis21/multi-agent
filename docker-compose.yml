# ─────────────────────────────────────────────────────────────────────────────
# Phoebe (Multi-Agent Backend) — Production Stack
#
# Services:
#   phoebe-api      Public API on port 8090. Orchestrates supervisor/worker loop.
#                Calls llama-api on host port 8080 for LLM inference.
#                Calls phoebe-sandbox for tool execution.
#   phoebe-sandbox  Isolated MCP tool server (internal only, not exposed).
#                Has Docker socket and full project mount for self-improvement.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

secrets:
  openvpn_config:
    file: /home/homelab/openclaw/secrets/openvpn_config

services:

  # ── Notion MCP Server ─────────────────────────────────────────────────────
  phoebe-notion:
    build:
      context: ./notion
      dockerfile: Dockerfile
      network: host
    container_name: phoebe-notion
    environment:
      NOTION_TOKEN: "${NOTION_TOKEN:-}"
    networks:
      - phoebe-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *logging

  # ── Discord Bots ──────────────────────────────────────────────────────────
  phoebe-discord:
    build:
      context: ./discord
      dockerfile: Dockerfile
      network: host
    container_name: phoebe-discord
    environment:
      DISCORD_TOKEN_WORKER: "${DISCORD_TOKEN_WORKER:-}"
      DISCORD_TOKEN_CONFIG: "${DISCORD_TOKEN_CONFIG:-}"
      DISCORD_TOKEN_MOD: "${DISCORD_TOKEN_MOD:-}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-}"
      DISCORD_WORKER_CHANNELS: "${DISCORD_WORKER_CHANNELS:-}"
      DISCORD_CONFIG_CHANNELS: "${DISCORD_CONFIG_CHANNELS:-}"
      DISCORD_ALLOWED_USER_IDS: "${DISCORD_ALLOWED_USER_IDS:-}"
      DISCORD_WORKER_NICKNAME: "${DISCORD_WORKER_NICKNAME:-Gemma}"
      DISCORD_MAX_MESSAGE_LENGTH: "1900"
      PHOEBE_API_URL: "http://phoebe-vpn:8090"
      # E2E scenario runner (optional; empty in production)
      DISCORD_TEST_CHANNEL_ID: "${DISCORD_TEST_CHANNEL_ID:-}"
      DISCORD_TEST_DRIVER_USER_ID: "${DISCORD_TEST_DRIVER_USER_ID:-}"
      PHOEBE_ENABLE_TEXT_COMMANDS: "${PHOEBE_ENABLE_TEXT_COMMANDS:-}"
      # "1" = keep scenario messages in the channel (default); "0" = delete bot
      # messages after each scenario (CI-style).
      PHOEBE_E2E_PERSIST_MESSAGES: "${PHOEBE_E2E_PERSIST_MESSAGES:-1}"
    networks:
      - phoebe-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      # Persistent bot state — session IDs and user modes survive container restarts
      - ./state/discord:/app/state
      # E2E scenario runner — mounted read-only so `make e2e` works without rebuild
      - ./discord/e2e_scenarios.py:/app/e2e_scenarios.py:ro
      # E2E scenarios need to write a probe SKILL.md to exercise skill-discovery
      - ./config/skills:/config/skills
      # Session state files — read-only hydration source for bot on startup
      - ./state/sessions:/state/sessions:ro
      # Source mounts so bot_worker/bot_config/bot_mod edits don't require a rebuild
      - ./discord/bot_worker.py:/app/bot_worker.py
      - ./discord/bot_config.py:/app/bot_config.py
      - ./discord/bot_mod.py:/app/bot_mod.py
      - ./discord/main.py:/app/main.py
      - ./discord/utils.py:/app/utils.py
      - ./discord/views.py:/app/views.py
    restart: unless-stopped
    logging: *logging
    depends_on:
      phoebe-api:
        condition: service_healthy

  # ── OpenVPN Sidecar ───────────────────────────────────────────────────────
  # phoebe-api and phoebe-sandbox share this container's network namespace via
  # network_mode: service:phoebe-vpn, inheriting the tunnel routes automatically.
  phoebe-vpn:
    build:
      context: ./vpn
      dockerfile: Dockerfile
      network: host
    container_name: phoebe-vpn
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    secrets: [openvpn_config]
    networks:
      - phoebe-net
      - llama-api_default
    ports:
      - "8090:8090"
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
    healthcheck:
      test: ["CMD", "sh", "-c", "ip link show tun0 2>/dev/null | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    logging: *logging

  # ── Isolated MCP Tool Sandbox ──────────────────────────────────────────────
  # Start sandbox first; phoebe-api depends on it being healthy.
  phoebe-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: phoebe-sandbox
    command: ["uvicorn", "sandbox.mcp_server:app", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      WORKSPACE_DIR: "/workspace"
      CONFIG_DIR: "/config"
      STATE_DIR: "/state"
      CACHE_DIR: "/cache"
      PROJECT_DIR: "/project"
      MEMPALACE_HOME: "/state/chroma"
      PROMPTS_DIR: "/config/prompts"
      GENERATED_DIR: "/cache/prompts"
      EXA_API_KEY: "${EXA_API_KEY:-}"
      NOTION_URL: "http://phoebe-notion:3000"
      NOTION_TOKEN: "${NOTION_TOKEN:-}"
      DISCORD_URL: "http://phoebe-discord:4000"
      DISCORD_TOKEN_WORKER: "${DISCORD_TOKEN_WORKER:-}"
      DISCORD_TOKEN_CONFIG: "${DISCORD_TOKEN_CONFIG:-}"
      LLAMA_URL: "http://llama-api-manager:8081"
    volumes:
      # User-edited config: identity, skills, prompts, *.yaml (rw — skills are agent-written)
      - ./config:/config
      # Host-installed skills (e.g. `npx skills add …` → ~/.agents/skills). Read-only;
      # picked up by _discover_skills as a second root. Project skills win on collision.
      - ${HOST_SKILLS_DIR:-/home/homelab/.agents/skills}:/config/host_skills:ro
      # Agent-written persistent state: soul/, memory/, sessions/, discord/, chroma/
      - ./state:/state
      # Regenerable cache: prompts/ (audit trail, cleaned per-session)
      - ./cache:/cache
      # Agent scratch (downloads, clones, tool tests, venv)
      - ./workspace:/workspace
      # Full project repo for agent self-inspection — read-only (not a clone)
      - .:/project:ro
      # Docker socket for docker_test_up / docker_test_down tools
      - /var/run/docker.sock:/var/run/docker.sock
      # Live-reload: code changes take effect on next request without rebuild
      - ./sandbox:/app/sandbox
    network_mode: "service:phoebe-vpn"
    # No ports: section — not exposed to host, internal network only
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    logging: *logging
    depends_on:
      phoebe-vpn:
        condition: service_healthy

  # ── Orchestration API ──────────────────────────────────────────────────────
  phoebe-api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: phoebe-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8090", "--reload"]
    environment:
      # LLM inference endpoint (existing llama-api on host)
      LLAMA_URL: "http://llama-api-manager:8081"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      # Mirrored from the sandbox only so the live test suite (which runs inside
      # phoebe-api) can detect they're configured. The actual tool calls hit the
      # sandbox, not the api — keys here are gate-only.
      EXA_API_KEY: "${EXA_API_KEY:-}"
      NOTION_TOKEN: "${NOTION_TOKEN:-}"
      # phoebe-sandbox shares this container's network namespace (via phoebe-vpn),
      # so it is reachable on localhost rather than by hostname.
      SANDBOX_URL: "http://localhost:9000"
      DISCORD_URL: "http://phoebe-discord:4000"
      # Path overrides (these paths are inside the container)
      CONFIG_PATH: "/app/config/config.yaml"
      AGENTS_CONFIG_PATH: "/app/config/agents.yaml"
      SESSIONS_DIR: "/state/sessions"
      WORKSPACE_DIR: "/workspace"
      CONFIG_DIR: "/config"
      STATE_DIR: "/state"
      CACHE_DIR: "/cache"
      PROMPTS_DIR: "/config/prompts"
      GENERATED_DIR: "/cache/prompts"
    volumes:
      # User-edited config: identity, skills, prompts, *.yaml
      - ./config:/config
      # Host-installed skills (mirrors phoebe-sandbox mount). Read-only.
      - ${HOST_SKILLS_DIR:-/home/homelab/.agents/skills}:/config/host_skills:ro
      # Agent-written persistent state (session logs land here)
      - ./state:/state
      # Regenerable cache (generated prompts audit trail)
      - ./cache:/cache
      # Agent scratch
      - ./workspace:/workspace
      # Live-editable: code + config reload without restart
      - ./config:/app/config
      - ./app:/app/app
      # Tests (pure-unit runnable inside the container via `make test-fast`)
      - ./test:/app/test
      - ./pytest.ini:/app/pytest.ini:ro
      # Full project repo (ro) — lets the in-container test suite reach sibling
      # sources (e.g. discord/utils.py for fence-aware split_message tests).
      # Mirrors the mount on phoebe-sandbox.
      - .:/project:ro
      # Claude Code OAuth credentials — read-only, for Anthropic provider auth
      - /home/homelab/.claude/.credentials.json:/app/.claude_credentials.json:ro
    network_mode: "service:phoebe-vpn"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *logging
    depends_on:
      phoebe-vpn:
        condition: service_healthy
      phoebe-sandbox:
        condition: service_healthy

networks:
  phoebe-net:
    driver: bridge
  llama-api_default:
    external: true
